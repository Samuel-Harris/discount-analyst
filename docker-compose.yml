# Local development stack: FastAPI + Vite dev server.
# SQLite is stored in a named volume at DASHBOARD_DATABASE_PATH.

services:
  # Backend image entrypoint runs `alembic upgrade head` then uvicorn (see backend/docker/entrypoint.sh).
  backend:
    build:
      context: .
      dockerfile: backend/docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - dashboard_sqlite:/data
    env_file:
      - path: .env
        required: false
    environment:
      DASHBOARD_DATABASE_PATH: /data/dashboard.sqlite

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: development
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      ENV: DEV
      VITE_DEV_PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  dashboard_sqlite:
  frontend_node_modules:
