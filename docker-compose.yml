# Terminal orchestrator only (backend + UI run on host — see .vscode/launch.json)
# docker compose up --build
# Optional repo bind for sandboxes:
# TERMINAL_WORKSPACE_HOST_PATH="$(pwd)" docker compose up --build

services:
  # Orchestrator: creates per-run gVisor sandboxes via Docker socket (not mounted on backend).
  agent-terminal:
    build:
      context: .
      dockerfile: backend/services/agent_terminal/Dockerfile.service
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      TERMINAL_SANDBOX_IMAGE: discount-analyst-terminal-sandbox:local
      # Default runc for local Docker Desktop; set DOCKER_RUNTIME=runsc when gVisor is installed.
      DOCKER_RUNTIME: ${DOCKER_RUNTIME:-runc}
      TERMINAL_COMMAND_TIMEOUT_S: "300"
      TERMINAL_MAX_OUTPUT_BYTES: "2097152"
      # Optional: host path to repo root so sandboxes can read project files (read-only).
      # Example: TERMINAL_WORKSPACE_HOST_PATH="$(pwd)" docker compose up
      TERMINAL_WORKSPACE_HOST_PATH: ${TERMINAL_WORKSPACE_HOST_PATH:-}
    ports:
      - "8001:8001"
