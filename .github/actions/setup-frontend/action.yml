name: "Setup frontend (pnpm)"
description: "Install Node.js, pnpm, and frontend dependencies"

inputs:
  working-directory:
    description: "Directory containing the frontend package"
    required: false
    default: "frontend"

runs:
  using: "composite"
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: "pnpm"
        cache-dependency-path: ${{ inputs.working-directory }}/pnpm-lock.yaml

    - name: Install frontend dependencies
      run: pnpm install --frozen-lockfile
      shell: bash
      working-directory: ${{ inputs.working-directory }}
