name: "Setup Python and Dependencies"
description: "Sets up Python 3.14 and installs uv dependencies"

runs:
  using: "composite"
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        python-version: "3.14"
        enable-cache: true

    - name: Install dependencies
      run: uv sync
      shell: bash
