name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python and Dependencies
        uses: ./.github/actions/setup-python

      - name: Run pre-commit
        run: uv run pre-commit run --all-files

  pytest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python and Dependencies
        uses: ./.github/actions/setup-python

      - name: Run tests with pytest
        run: |
          uv run pytest

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install, build, and test frontend
        run: |
          cd frontend && npm ci && npm run build && npm test

  pyright:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python and Dependencies
        uses: ./.github/actions/setup-python

      - name: Run pyright
        run: |
          uv run pyright

  alembic-schema-drift:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python and Dependencies
        uses: ./.github/actions/setup-python

      - name: Verify Alembic head matches ORM metadata
        env:
          DASHBOARD_DATABASE_PATH: ${{ runner.temp }}/alembic-check.sqlite
        run: |
          uv run python scripts/check_alembic_schema.py

  frontend-api-drift:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python and Dependencies
        uses: ./.github/actions/setup-python

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Regenerate OpenAPI and Orval client
        env:
          DASHBOARD_DATABASE_PATH: ${{ runner.temp }}/dashboard-openapi.sqlite
          # Dummy values only: ``common.config`` builds ``Settings`` at import time (matches ``tests/conftest.py``).
          LOGGING__LOGFIRE_API_KEY: pytest-dummy-logfire-token
          PERPLEXITY__API_KEY: pytest-dummy-perplexity
          PERPLEXITY__RATE_LIMIT_PER_MINUTE: "60"
          FMP__API_KEY: pytest-dummy-fmp
          EODHD__API_KEY: pytest-dummy-eodhd
        run: |
          uv run python scripts/export_dashboard_openapi.py
          cd frontend && npm ci && npm run generate:api && npm run build

      - name: Fail if OpenAPI or generated client drifted
        run: |
          git diff --exit-code -- frontend/openapi.json frontend/src/api/generated.ts || {
            echo "Regenerated API artefacts differ from the committed tree."
            echo "From the repo root run: uv run python scripts/export_dashboard_openapi.py"
            echo "Then: cd frontend && npm run generate:api"
            echo "Commit frontend/openapi.json and frontend/src/api/generated.ts"
            exit 1
          }
