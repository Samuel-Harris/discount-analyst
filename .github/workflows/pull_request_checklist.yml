name: PR checklist

on:
  pull_request:
    branches:
      - main
    types: [opened, reopened]

jobs:
  comment:
    permissions:
      pull-requests: write
      contents: read

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update comment
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: .github/resources/pull_request_template.md
